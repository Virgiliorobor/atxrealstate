[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm ci",
  "cd ../the_agency_website && npm ci --no-audit --no-fund",
]

[phases.build]
cmds = [
  "npm run build:demo",
  "cd ../the_agency_website && ./node_modules/.bin/vite build --base=/the_agency_website/ --outDir ../demo/dist/client/the_agency_website",
]

[start]
cmd = "node dist/server/index.js"
