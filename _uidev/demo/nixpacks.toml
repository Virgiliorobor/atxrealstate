[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm ci",
  "cd ../the_agency_website && npm ci --no-audit --no-fund",
]

[phases.build]
cmds = [
  "npm run build:demo",
  "cd ../the_agency_website && npm run build -- --base=/the_agency_website/",
  "node scripts/sync-agency-website.mjs",
]

[start]
cmd = "node dist/server/index.js"
