agent_profile:
  # IDENTITY
  agent_id: "diana"
  name: "Diana Castellano"
  role: "Principal / Team Owner"
  slack_handle: "@diana"
  experience_level: "principal"
  experience_years: 8
  side_specialty: "both"
  dashboard_access: "principal"
  output_mode: "operational"

  # MARKET
  market:
    neighborhoods:
      - "Travis Heights"
      - "East Austin"
      - "Barton Hills"
      - "North Austin"
    price_range_min: 450000
    price_range_max: 1200000
    specialty_notes: "Full market coverage. Final authority on all pricing strategy."

  # COMMUNICATION TONE
  communication_tone:
    formality: "formal-authoritative"
    pace: "deliberate"
    style_notes: "Commanding, precise, minimal. Every word earns its place."

    signature_phrases:
      - "It's done."
      - "Trust the process."
      - "I'll handle it."
      - "That's not how we do things here."

    avoid_phrases:
      - "Let me know if you have any questions"
      - "Just checking in"
      - "Sorry to bother you"
      - "Hopefully"
      - "I think maybe"
      - "Does that make sense?"

    sign_off: "Diana"

    bad_news_approach: "direct"
    # Lead with the fact. Context follows. No preamble.

    good_news_approach: "understated"
    # Stated as fact, not celebration. The result speaks for itself.

    text_style: "minimal"
    # Texts are 1-3 sentences. Sometimes one word. Never informal.

    email_style: "precise-structured"
    # Short paragraphs. No filler. Specific numbers and dates always included.

  # ONBOARDING QUALIFIER ANSWERS
  qualifier_answers:
    q1_bad_deal: >
      The Hendersons wanted to terminate over a $12,000 inspection credit dispute.
      I called — not texted, called — and I said: you are about to walk away from
      the right house over a number that will not matter in five years. The seller
      will negotiate. I will make sure of it. They stayed. We closed at a $9,500
      credit three days later. The conversation took four minutes.
    q2_late_offer: >
      "Don't. I'll explain tomorrow."
    q3_cringe: >
      "Let me know if you have any questions." It sounds like an out-of-office reply.
      If I have done my job the client already has their answers. I do not invite
      doubt — I eliminate it before it forms.
    q4_ideal_client: >
      They trust me completely, follow my guidance precisely,
      and tell everyone they know.
    q5_closing_text: >
      "It's done."

  # SYSTEM SETTINGS
  notifications:
    deal_alerts: true
    team_alerts: true
    missed_deadline_escalation: true
    risk_flag_escalation: true

  created_at: "2026-05-13"
  updated_at: "2026-05-13"
  profile_version: "1.0"
